name: WealthAlgo

on:
  schedule:
    # Session 1: 09:15 AM to 12:30 PM IST (03:45 AM to 07:00 AM UTC) -> 195 mins
    - cron: '45 3 * * 1-5'
    # Session 2: 12:30 PM to 03:30 PM IST (07:00 AM to 10:00 AM UTC) -> 180 mins
    - cron: '0 7 * * 1-5'
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # RD1858 — runs in parallel with PS5673
  # ────────────────────────────────────────────────────────────────────────────
  RD1858:
    runs-on: ubuntu-latest
    timeout-minutes: 210       # Safety buffer slightly above max session length (195m)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: rd1858-${{ hashFiles('RD1858/requirements.txt') }}
          restore-keys: rd1858-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r RD1858/requirements.txt
          pip install playwright pyotp

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Run RD1858 bot (headless Chrome login + trading)
        working-directory: RD1858
        timeout-minutes: 200   # Will automatically stop the script when the session ends
        env:
          KITE_USER_ID:        ${{ secrets.RD1858_USER_ID }}
          KITE_PASSWORD:       ${{ secrets.RD1858_PASSWORD }}
          KITE_TOTP_SECRET:    ${{ secrets.RD1858_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_PORT:            "5000"
          PYTHONIOENCODING:    utf-8
          PYTHONUTF8:          "1"
        run: python cloud_launcher.py

  # ────────────────────────────────────────────────────────────────────────────
  # PS5673 — runs in parallel with RD1858
  # ────────────────────────────────────────────────────────────────────────────
  PS5673:
    runs-on: ubuntu-latest
    timeout-minutes: 210       # Safety buffer slightly above max session length (195m)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ps5673-${{ hashFiles('PS5673/requirements.txt') }}
          restore-keys: ps5673-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r PS5673/requirements.txt
          pip install playwright pyotp

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Run PS5673 bot (headless Chrome login + trading)
        working-directory: PS5673
        timeout-minutes: 200   # Will automatically stop the script when the session ends
        env:
          KITE_USER_ID:        ${{ secrets.PS5673_USER_ID }}
          KITE_PASSWORD:       ${{ secrets.PS5673_PASSWORD }}
          KITE_TOTP_SECRET:    ${{ secrets.PS5673_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_PORT:            "5001"
          PYTHONIOENCODING:    utf-8
          PYTHONUTF8:          "1"
        run: python cloud_launcher.py