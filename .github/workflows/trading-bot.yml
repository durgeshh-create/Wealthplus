name: WealthAlgo

on:
  schedule:
    # Session 1: 09:15 AM to 12:30 PM IST (03:45 AM to 07:00 AM UTC) -> 195 mins
    - cron: '45 3 * * 1-5'
    # Session 2: 12:30 PM to 03:30 PM IST (07:00 AM to 10:00 AM UTC) -> 180 mins
    - cron: '0 7 * * 1-5'
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

# Workflow-level permissions — required for gh-pages push from Actions
permissions:
  contents: write

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # RD1858 — runs in parallel with PS5673
  # ────────────────────────────────────────────────────────────────────────────
  RD1858:
    runs-on: ubuntu-latest
    timeout-minutes: 210

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so we can push to gh-pages

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: rd1858-${{ hashFiles('RD1858/requirements.txt') }}
          restore-keys: rd1858-

      # Restore enctoken from previous attempt/run — skips TOTP login if still valid.
      - name: Restore enctoken cache (RD1858)
        uses: actions/cache/restore@v4
        with:
          path: RD1858/config/enctoken.json
          key: enctoken-rd1858-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            enctoken-rd1858-${{ github.run_id }}-
            enctoken-rd1858-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r RD1858/requirements.txt
          pip install playwright pyotp

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Configure git for gh-pages push
        run: |
          git config user.name  "WealthAlgo Bot"
          git config user.email "bot@wealthalgo.local"
          git fetch origin gh-pages 2>/dev/null || echo "gh-pages branch not yet created"

      - name: Run RD1858 bot + live snapshot pusher
        working-directory: RD1858
        timeout-minutes: 200
        env:
          KITE_USER_ID:        ${{ secrets.RD1858_USER_ID }}
          KITE_PASSWORD:       ${{ secrets.RD1858_PASSWORD }}
          KITE_TOTP_SECRET:    ${{ secrets.RD1858_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_PORT:            "5000"
          PYTHONIOENCODING:    utf-8
          PYTHONUTF8:          "1"
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:             ${{ github.repository }}
        run: |
          (
            cd "$GITHUB_WORKSPACE"
            while true; do
              sleep 300
              if [ -f /tmp/status_rd1858.json ]; then
                git fetch origin gh-pages 2>/dev/null || true
                if [ ! -d /tmp/gh-pages-rd1858 ]; then
                  git worktree add /tmp/gh-pages-rd1858 gh-pages 2>/dev/null || \
                    git worktree add /tmp/gh-pages-rd1858 --orphan gh-pages
                fi
                cp /tmp/status_rd1858.json /tmp/gh-pages-rd1858/status_rd1858.json
                cd /tmp/gh-pages-rd1858
                git add status_rd1858.json
                if ! git diff --cached --quiet; then
                  git commit -m "rd1858 snapshot $(date -u +'%H:%M UTC')"
                  git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" gh-pages
                fi
                cd "$GITHUB_WORKSPACE"
              fi
            done
          ) &
          PUSHER_PID=$!

          python cloud_launcher.py
          BOT_EXIT=$?

          kill $PUSHER_PID 2>/dev/null || true

          if [ -f /tmp/status_rd1858.json ]; then
            cd "$GITHUB_WORKSPACE"
            git fetch origin gh-pages 2>/dev/null || true
            if [ ! -d /tmp/gh-pages-rd1858 ]; then
              git worktree add /tmp/gh-pages-rd1858 gh-pages 2>/dev/null || \
                git worktree add /tmp/gh-pages-rd1858 --orphan gh-pages
            fi
python3 - <<'PYEOF'
import json, pathlib
p = pathlib.Path('/tmp/status_rd1858.json')
d = json.loads(p.read_text())
d['bot_running'] = False
p.write_text(json.dumps(d, indent=2))
PYEOF
            cp /tmp/status_rd1858.json /tmp/gh-pages-rd1858/status_rd1858.json
            cd /tmp/gh-pages-rd1858
            git add status_rd1858.json
            git diff --cached --quiet || \
              git commit -m "rd1858 final $(date -u +'%H:%M UTC')" && \
              git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" gh-pages
          fi

          exit $BOT_EXIT

      - name: Save enctoken cache (RD1858)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: RD1858/config/enctoken.json
          key: enctoken-rd1858-${{ github.run_id }}-${{ github.run_attempt }}

  # ────────────────────────────────────────────────────────────────────────────
  # PS5673 — runs in parallel with RD1858
  # ────────────────────────────────────────────────────────────────────────────
