name: WealthAlgo

on:
  schedule:
    # Session 1: 09:00 AM to 12:30 PM IST (03:30 AM to 07:00 AM UTC) -> 210 mins
    - cron: '30 3 * * 1-5'
    # Session 2: 12:35 PM to 03:30 PM IST (07:05 AM to 10:00 AM UTC) -> 175 mins
    # ✅ FIX: shifted 5 min later so Session 1's 200-min timeout (ends ~06:50 UTC)
    #         always clears before Session 2 is scheduled. Without this gap,
    #         GitHub queues Session 2 behind Session 1 in the concurrency group
    #         and silently drops it if the queue slot expires.
    - cron: '5 7 * * 1-5'
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

# Workflow-level permissions — required for gh-pages push from Actions
permissions:
  contents: write

# ✅ FIX: Removed single top-level concurrency group.
# Each job now carries its own concurrency group (defined inline) so that
# Session 2 (07:05 UTC) never contends with a still-running Session 1 job
# for the same concurrency slot. The gh-pages push lock is retained per-job.

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # bootstrap-ghpages — runs first, ensures index.html is always on gh-pages
  # ────────────────────────────────────────────────────────────────────────────
  bootstrap-ghpages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: bootstrap-ghpages
      cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Time-window guard (abort stale scheduled runs)
        run: |
          # Manual triggers always allowed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ Manual trigger — skipping time-window check"
            exit 0
          fi
          HOUR=$(date -u +%-H)
          MIN=$(date -u +%-M)
          NOW=$(( HOUR * 60 + MIN ))
          # Session 1: 9:00 AM IST = 3:30 UTC → allow 3:25–3:35 UTC only
          S1_START=$(( 3 * 60 + 25 ))
          S1_END=$(( 3 * 60 + 35 ))
          # Session 2: 12:35 PM IST = 7:05 UTC → allow 7:00–7:10 UTC only
          S2_START=$(( 7 * 60 + 0 ))
          S2_END=$(( 7 * 60 + 10 ))
          if [ $NOW -ge $S1_START ] && [ $NOW -le $S1_END ]; then
            echo "✅ Within Session 1 window ($HOUR:$(printf '%02d' $MIN) UTC) — proceeding"
          elif [ $NOW -ge $S2_START ] && [ $NOW -le $S2_END ]; then
            echo "✅ Within Session 2 window ($HOUR:$(printf '%02d' $MIN) UTC) — proceeding"
          else
            echo "⛔ $HOUR:$(printf '%02d' $MIN) UTC is outside allowed windows (3:25-3:35 or 7:00-7:10 UTC) — aborting stale run"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "WealthAlgo Bot"
          git config user.email "bot@wealthalgo.local"

      - name: Push index.html to gh-pages root
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:           ${{ github.repository }}
          DASHBOARD_PW_HASH: ${{ secrets.DASHBOARD_PW_HASH }}
        run: |
          set -e

          # ✅ FIX: previously "git fetch origin gh-pages 2>/dev/null || true"
          # silently swallowed any fetch failure, and "git worktree add /tmp/ghp
          # gh-pages" would then check out whatever LOCAL gh-pages ref happened
          # to exist (possibly stale/absent), instead of guaranteed-fresh remote
          # content. This produced "No changes, skipping commit" even when
          # main's settings-editor/index.html or options.html had genuinely
          # changed, because the worktree was silently diffing against stale
          # data — not against the real current gh-pages HEAD.
          echo "Fetching gh-pages from origin..."
          git fetch origin gh-pages

          # Remove any leftover worktree directory from a previous (possibly
          # failed) run on this same runner, and any stale local gh-pages
          # branch ref, so this always starts from the just-fetched remote
          # state with zero ambiguity.
          git worktree remove --force /tmp/ghp 2>/dev/null || true
          rm -rf /tmp/ghp
          git branch -D gh-pages 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            echo "Creating worktree from freshly-fetched origin/gh-pages"
            git worktree add /tmp/ghp -B gh-pages origin/gh-pages
          else
            echo "origin/gh-pages does not exist yet — creating orphan branch"
            git worktree add /tmp/ghp --orphan gh-pages
          fi

          echo "gh-pages worktree HEAD: $(git -C /tmp/ghp log -1 --format='%H %s' 2>/dev/null || echo '(no commits yet)')"

          # Source: prefer main/settings-editor/, otherwise use existing gh-pages file
          if [ -f settings-editor/index.html ]; then
            echo "Copying index.html from main/settings-editor/"
            cp settings-editor/index.html /tmp/ghp/index.html
          elif [ -f settings-editor/dashboard.html ]; then
            echo "Copying dashboard.html from main/settings-editor/"
            cp settings-editor/dashboard.html /tmp/ghp/index.html
          elif [ -f /tmp/ghp/index.html ]; then
            echo "index.html sourced from gh-pages"
            # intentionally no-op here — file already at /tmp/ghp/index.html
          else
            echo "ERROR: index.html not found anywhere" && exit 1
          fi

          # options.html is optional — only deploy it if it exists on main.
          if [ -f settings-editor/options.html ]; then
            echo "Copying options.html from main/settings-editor/"
            cp settings-editor/options.html /tmp/ghp/options.html
          fi

          # ── Inject DASHBOARD_PW_HASH secret into placeholder ────────────────
          # Runs unconditionally so the hash is always current, even when the
          # source file came from gh-pages (no settings-editor/ copy on main).
          # grep guard makes this idempotent — won't corrupt an already-injected file.
          for f in /tmp/ghp/index.html /tmp/ghp/options.html; do
            [ -f "$f" ] || continue
            if [ -n "${DASHBOARD_PW_HASH}" ]; then
              if grep -q "%%DASHBOARD_PW_HASH%%" "$f"; then
                sed -i "s|%%DASHBOARD_PW_HASH%%|${DASHBOARD_PW_HASH}|g" "$f"
                echo "✅ Password hash injected into $(basename $f)"
              else
                echo "ℹ Placeholder not found in $(basename $f) — upload the latest from settings-editor/"
              fi
            else
              echo "⚠ DASHBOARD_PW_HASH secret not set — password gate will show config error"
            fi
          done

          cd /tmp/ghp
          git add index.html
          [ -f options.html ] && git add options.html
          echo "--- git status before diff check ---"
          git status --short
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
          else
            echo "Changes detected — committing"
            git commit -m "deploy index.html + options.html $(date -u +'%Y-%m-%d %H:%M')"
            for _retry in 1 2 3; do
              git pull --rebase "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" gh-pages 2>/dev/null || true
              if git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" gh-pages; then
                echo "✅ Pushed to gh-pages successfully"
                break
              fi
              echo "Push attempt ${_retry} failed — retrying..."
              sleep 3
            done
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # RD1858 — runs in parallel with PS5673, after bootstrap
  # ────────────────────────────────────────────────────────────────────────────
  RD1858:
    needs: bootstrap-ghpages
    runs-on: ubuntu-latest
    timeout-minutes: 210
    # ✅ FIX: own concurrency group per run — won't block Session 2 from starting
    concurrency:
      group: rd1858-bot
      cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: rd1858-${{ hashFiles('RD1858/requirements.txt') }}
          restore-keys: rd1858-

      - name: Cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Restore enctoken cache (RD1858)
        uses: actions/cache/restore@v4
        with:
          path: RD1858/config/enctoken.json
          key: enctoken-rd1858-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            enctoken-rd1858-${{ github.run_id }}-
            enctoken-rd1858-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip -q
          pip install -r RD1858/requirements.txt -q
          pip install playwright pyotp -q

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Configure git for gh-pages push
        run: |
          git config user.name  "WealthAlgo Bot"
          git config user.email "bot@wealthalgo.local"
          git fetch origin gh-pages 2>/dev/null || echo "gh-pages branch not yet created"

      # Full Scanner-universe seeding (~575 ETF/NIFTY200/Midcap150 symbols)
      # moved out of this regular bot session — it was adding significant
      # time to every single run even though the bot only trades a couple
      # of symbols. Use the "⬇ Seed Scanner Data" button on the Scanner
      # page (or the "Seed Scanner Data (On-Demand)" workflow) instead,
      # whenever the Scanner's data actually needs refreshing.

      - name: Seed Marketwatch-only CSVs (RD1858)
        # Read-only w.r.t. trading config: seeds whatever symbols are saved in
        # settings-editor/marketwatch.json so the Scanner page's Marketwatch
        # panel always has data, without ever touching active_etfs/bnh_symbols.
        working-directory: RD1858
        timeout-minutes: 10
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8:       "1"
        run: |
          echo "📥 Seeding Marketwatch-only CSVs for RD1858…"
          python seed_marketwatch_csvs.py || echo "⚠️ Marketwatch seed failed — continuing"

      - name: Commit updated CSVs to repo (RD1858)
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:      ${{ github.repository }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git add --force RD1858/data/daily/*.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "seed: update ${COUNT} CSVs (RD1858) $(date -u +'%Y-%m-%d')"
            for _retry in 1 2 3; do
              git pull --rebase "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" main 2>/dev/null || true
              git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" main && break
              sleep 5
            done
            echo "✅ CSVs committed and pushed"
          else
            echo "ℹ️ No CSV changes to commit"
          fi

      - name: Run RD1858 bot + live snapshot pusher
        working-directory: RD1858
        timeout-minutes: 185
        env:
          KITE_USER_ID:        ${{ secrets.RD1858_USER_ID }}
          KITE_PASSWORD:       ${{ secrets.RD1858_PASSWORD }}
          KITE_TOTP_SECRET:    ${{ secrets.RD1858_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_PORT:            "5000"
          PYTHONIOENCODING:    utf-8
          PYTHONUTF8:          "1"
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:             ${{ github.repository }}
        run: |
          # ── Background pusher: Contents API every 60 s (no git, no rebase) ──
          (
            cd "$GITHUB_WORKSPACE"
            # Wait until bot writes its first snapshot (auth takes 60-120 s)
            until [ -f /tmp/status_rd1858.json ]; do sleep 5; done
            echo "[pusher-rd1858] First snapshot detected — starting push loop"
            while true; do
              python3 push_snapshot.py /tmp/status_rd1858.json status_rd1858.json || true
              sleep 60
            done
          ) &
          PUSHER_PID=$!

          python cloud_launcher.py
          BOT_EXIT=$?

          kill $PUSHER_PID 2>/dev/null || true

          # ── Final push: mark bot_running=False then push via Contents API ───
          if [ -f /tmp/status_rd1858.json ]; then
            printf 'import json, pathlib\np = pathlib.Path("/tmp/status_rd1858.json")\nd = json.loads(p.read_text())\nd["bot_running"] = False\np.write_text(json.dumps(d, indent=2))\n' > /tmp/set_offline_rd1858.py
            python3 /tmp/set_offline_rd1858.py
            cd "$GITHUB_WORKSPACE"
            python3 push_snapshot.py /tmp/status_rd1858.json status_rd1858.json || true
          fi

          exit $BOT_EXIT

      - name: Save enctoken cache (RD1858)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: RD1858/config/enctoken.json
          key: enctoken-rd1858-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Force bot_running=False on timeout / cancellation (RD1858)
        # ✅ FIX: the "Final push" inside the bot run step only executes on a
        # clean exit. If that step is killed by timeout-minutes or a workflow
        # cancellation, execution never reaches those lines and the LAST
        # pushed snapshot keeps bot_running=true forever — the dashboard then
        # shows "Live ✓" on data that may be many hours old (e.g. yesterday's
        # mutual fund NAV), with no staleness warning since isMarketHours
        # gating also gets bypassed once botOn looks true.
        # if: always() makes this step run regardless of how the prior step
        # ended, so a final accurate "offline" snapshot always reaches gh-pages.
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:      ${{ github.repository }}
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ -f /tmp/status_rd1858.json ]; then
            python3 - << 'PYEOF'
          import json, pathlib
          p = pathlib.Path("/tmp/status_rd1858.json")
          d = json.loads(p.read_text())
          d["bot_running"] = False
          p.write_text(json.dumps(d, indent=2))
          PYEOF
            python3 push_snapshot.py /tmp/status_rd1858.json status_rd1858.json || true
          else
            echo "[RD1858] No snapshot file found — nothing to mark offline"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # PS5673 — runs in parallel with RD1858, after bootstrap
  # ────────────────────────────────────────────────────────────────────────────
  PS5673:
    needs: bootstrap-ghpages
    runs-on: ubuntu-latest
    timeout-minutes: 210
    # ✅ FIX: own concurrency group per run — won't block Session 2 from starting
    concurrency:
      group: ps5673-bot
      cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ps5673-${{ hashFiles('PS5673/requirements.txt') }}
          restore-keys: ps5673-

      - name: Cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Restore enctoken cache (PS5673)
        uses: actions/cache/restore@v4
        with:
          path: PS5673/config/enctoken.json
          key: enctoken-ps5673-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            enctoken-ps5673-${{ github.run_id }}-
            enctoken-ps5673-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip -q
          pip install -r PS5673/requirements.txt -q
          pip install playwright pyotp -q

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Configure git for gh-pages push
        run: |
          git config user.name  "WealthAlgo Bot"
          git config user.email "bot@wealthalgo.local"
          git fetch origin gh-pages 2>/dev/null || echo "gh-pages branch not yet created"

      - name: Run PS5673 bot + live snapshot pusher
        working-directory: PS5673
        timeout-minutes: 185
        env:
          KITE_USER_ID:        ${{ secrets.PS5673_USER_ID }}
          KITE_PASSWORD:       ${{ secrets.PS5673_PASSWORD }}
          KITE_TOTP_SECRET:    ${{ secrets.PS5673_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_PORT:            "5001"
          PYTHONIOENCODING:    utf-8
          PYTHONUTF8:          "1"
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:             ${{ github.repository }}
        run: |
          # ── Background pusher: Contents API every 60 s (no git, no rebase) ──
          (
            cd "$GITHUB_WORKSPACE"
            # Wait until bot writes its first snapshot (auth takes 60-120 s)
            until [ -f /tmp/status_ps5673.json ]; do sleep 5; done
            echo "[pusher-ps5673] First snapshot detected — starting push loop"
            while true; do
              python3 push_snapshot.py /tmp/status_ps5673.json status_ps5673.json || true
              sleep 60
            done
          ) &
          PUSHER_PID=$!

          python cloud_launcher.py
          BOT_EXIT=$?

          kill $PUSHER_PID 2>/dev/null || true

          # ── Final push: mark bot_running=False then push via Contents API ───
          if [ -f /tmp/status_ps5673.json ]; then
            printf 'import json, pathlib\np = pathlib.Path("/tmp/status_ps5673.json")\nd = json.loads(p.read_text())\nd["bot_running"] = False\np.write_text(json.dumps(d, indent=2))\n' > /tmp/set_offline_ps5673.py
            python3 /tmp/set_offline_ps5673.py
            cd "$GITHUB_WORKSPACE"
            python3 push_snapshot.py /tmp/status_ps5673.json status_ps5673.json || true
          fi

          exit $BOT_EXIT

      - name: Save enctoken cache (PS5673)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: PS5673/config/enctoken.json
          key: enctoken-ps5673-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Force bot_running=False on timeout / cancellation (PS5673)
        # See matching RD1858 step above for the full explanation.
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:      ${{ github.repository }}
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ -f /tmp/status_ps5673.json ]; then
            python3 - << 'PYEOF'
          import json, pathlib
          p = pathlib.Path("/tmp/status_ps5673.json")
          d = json.loads(p.read_text())
          d["bot_running"] = False
          p.write_text(json.dumps(d, indent=2))
          PYEOF
            python3 push_snapshot.py /tmp/status_ps5673.json status_ps5673.json || true
          else
            echo "[PS5673] No snapshot file found — nothing to mark offline"
          fi
