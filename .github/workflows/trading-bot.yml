d['bot_running'] = False
p.write_text(json.dumps(d, indent=2))
PYEOF
            cp /tmp/status_ps5673.json /tmp/gh-pages-ps5673/status_ps5673.json
            cd /tmp/gh-pages-ps5673
            git add status_ps5673.json
            git diff --cached --quiet || \
              git commit -m "ps5673 final $(date -u +'%H:%M UTC')" && \
              git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" gh-pages
          fi

          exit $BOT_EXIT

      - name: Save enctoken cache (PS5673)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: PS5673/config/enctoken.json
          key: enctoken-ps5673-${{ github.run_id }}-${{ github.run_attempt }}
